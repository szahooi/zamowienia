<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logowanie</title>
  <style>
    :root { --bg:#f5f7f3; --panel:#fff; --ink:#1f2722; --muted:#627066; --line:#d8ded7; --accent:#0f766e; --bad:#b42318; font-family: Inter, system-ui, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:18px; background:var(--bg); color:var(--ink); }
    form { width:min(420px,100%); display:grid; gap:14px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:22px; box-shadow:0 12px 34px rgba(34,42,37,.08); }
    h1 { margin:0; font-size:24px; }
    label { display:grid; gap:6px; color:var(--muted); font-size:13px; font-weight:700; }
    input { width:100%; border:1px solid var(--line); border-radius:7px; min-height:42px; padding:9px 11px; font:inherit; }
    button { border:0; border-radius:7px; min-height:42px; padding:0 14px; background:var(--accent); color:#fff; font:inherit; font-weight:750; cursor:pointer; }
    .error { min-height:18px; color:var(--bad); font-size:13px; font-weight:700; }
  </style>
</head>
<body>
  <form method="post">
    <h1>Kalkulator zamówień</h1>
    <label>Hasło <input name="password" type="password" autocomplete="current-password" autofocus></label>
    <button type="submit">Zaloguj</button>
    <div class="error">{{ error }}</div>
  </form>
</body>
</html>
